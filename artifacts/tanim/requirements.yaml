packages:
  "recharts": "For the Admin and Farmer dashboard charts"
  "framer-motion": "For page transitions and micro-interactions"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For robust form state management"
  "date-fns": "For formatting dates in orders and reviews"

images:
